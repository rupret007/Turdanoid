<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Arkanoid</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            max-width: 100%;
        }

        canvas {
            border: 2px solid #00ff88;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
            max-width: 100%;
            height: auto;
            display: block;
        }

        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ff88;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .score {
            margin-bottom: 10px;
        }

        .lives {
            color: #ff6b6b;
        }

        .mute-btn {
            position: absolute;
            top: 20px;
            right: 100px;
            background: rgba(0, 255, 136, 0.3);
            color: #00ff88;
            border: 1px solid #00ff88;
            padding: 5px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
        }

        .mute-btn:hover {
            background: rgba(0, 255, 136, 0.5);
        }

        .how-to-play {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            color: #00ff88;
            padding: 24px;
            border-radius: 15px;
            border: 2px solid #00ff88;
            z-index: 200;
            text-align: center;
        }

        .how-to-play p {
            margin-bottom: 16px;
            font-size: 16px;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: #00ff88;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            display: none;
            border: 2px solid #00ff88;
        }

        .game-over h2 {
            margin-bottom: 20px;
            font-size: 2em;
        }

        .restart-btn {
            background: #00ff88;
            color: #000;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .restart-btn:hover {
            background: #00cc6a;
            transform: scale(1.05);
        }

        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #00ff88;
            border-radius: 50%;
            animation: float 6s infinite linear;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    <a href="hub.html" style="position:fixed;top:10px;right:10px;color:#00ff88;font-size:14px;text-decoration:none;z-index:100;">← Game Hub</a>
    <div class="how-to-play" id="howToPlay" style="display:none;">
        <p>Move paddle with mouse or touch. Space or P to pause. Break blocks, collect power-ups!</p>
        <button class="restart-btn" onclick="dismissHowToPlay()">Got it</button>
    </div>
    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="ui">
            <div class="score">Score: <span id="score">0</span></div>
            <div class="high-score">High Score: <span id="highScore">0</span></div>
            <div class="lives">Lives: <span id="lives">3</span></div>
            <div class="level">Level: <span id="level">1</span></div>
            <div class="combo" id="comboDisplay" style="display:none;">Combo: <span id="combo">0</span>x</div>
            <button class="mute-btn" id="muteBtn" onclick="toggleMute()">Mute</button>
        </div>
        <div class="game-over" id="gameOver">
            <h2>Game Over!</h2>
            <p>Final Score: <span id="finalScore">0</span></p>
            <button class="restart-btn" onclick="restartGame()">Play Again</button>
        </div>
        <div class="game-over" id="pauseOverlay" style="display: none;">
            <h2>Paused</h2>
            <p>Press Space or P to resume</p>
            <button class="restart-btn" onclick="togglePause()">Resume</button>
            <button class="restart-btn" onclick="restartGame()" style="margin-top: 10px;">Restart</button>
        </div>
    </div>
    <script src="game.js"></script>
    <script>
        function togglePause() {
            if (typeof gameInstance !== 'undefined' && gameInstance && gameInstance.togglePause) {
                gameInstance.togglePause();
            }
        }
        function toggleMute() {
            if (typeof gameInstance !== 'undefined' && gameInstance && gameInstance.toggleMute) {
                gameInstance.toggleMute();
            }
        }
        function dismissHowToPlay() {
            const el = document.getElementById('howToPlay');
            if (el) el.style.display = 'none';
            try { localStorage.setItem('neonArkanoidSeenHint', '1'); } catch (e) {}
        }
        window.addEventListener('load', function() {
            if (!localStorage.getItem('neonArkanoidSeenHint')) {
                const el = document.getElementById('howToPlay');
                if (el) el.style.display = 'block';
            }
        });
    </script>
</body>
</html>
