<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Arkanoid</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .game-shell {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            justify-content: center;
            flex-wrap: wrap;
            padding: 20px;
        }

        .game-container {
            position: relative;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            width: min(90vw, 840px);
        }

        canvas {
            border: 2px solid #00ff88;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
            width: 100%;
            height: auto;
            display: block;
            touch-action: none;
        }

        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ff88;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .score {
            margin-bottom: 10px;
        }

        .lives {
            color: #ff6b6b;
        }

        .level {
            color: #ffd166;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: #00ff88;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            display: none;
            border: 2px solid #00ff88;
        }

        .game-over h2 {
            margin-bottom: 20px;
            font-size: 2em;
        }

        .restart-btn {
            background: #00ff88;
            color: #000;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .restart-btn:hover {
            background: #00cc6a;
            transform: scale(1.05);
        }

        .info-panel {
            background: rgba(0, 0, 0, 0.35);
            border: 2px solid rgba(0, 255, 136, 0.4);
            border-radius: 15px;
            padding: 20px;
            color: #eafff6;
            width: 260px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
        }

        .info-panel h3 {
            margin-bottom: 12px;
            color: #00ff88;
            font-size: 18px;
        }

        .status-row {
            font-size: 14px;
            margin-bottom: 8px;
        }

        .powerups {
            list-style: none;
            padding-left: 0;
            margin: 8px 0 12px 0;
            font-size: 14px;
        }

        .powerups li {
            margin: 4px 0;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 12px 0;
        }

        .control-btn {
            background: #00ff88;
            color: #000;
            border: none;
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: bold;
        }

        .control-btn.secondary {
            background: #4ecdc4;
        }

        .control-btn:hover {
            background: #00cc6a;
            transform: translateY(-1px);
        }

        .control-hint {
            font-size: 13px;
            line-height: 1.5;
            color: #c8f8df;
        }

        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #00ff88;
            border-radius: 50%;
            animation: float 6s infinite linear;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        @media (max-width: 900px) {
            body {
                overflow: auto;
            }

            .game-container {
                width: min(95vw, 840px);
            }

            .info-panel {
                width: min(90vw, 420px);
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    <div class="game-shell">
        <div class="game-container">
            <canvas id="gameCanvas" width="800" height="600"></canvas>
            <div class="ui">
                <div class="score">Score: <span id="score">0</span></div>
                <div class="lives">Lives: <span id="lives">3</span></div>
                <div class="level">Level: <span id="level">1</span></div>
            </div>
            <div class="game-over" id="gameOver">
                <h2>Game Over!</h2>
                <p>Final Score: <span id="finalScore">0</span></p>
                <button class="restart-btn" onclick="restartGame()">Play Again</button>
            </div>
            <div class="game-over" id="pauseOverlay" style="display: none;">
                <h2>Paused</h2>
                <p>Press Space, P, or Escape to resume</p>
                <button class="restart-btn" onclick="restartGame()">Restart</button>
            </div>
        </div>
        <aside class="info-panel">
            <h3>Game Status</h3>
            <div class="status-row">Ball: <span id="ballStatus">Ready</span></div>
            <div class="status-row">Active Power-ups:</div>
            <ul class="powerups" id="powerUpList">
                <li>None</li>
            </ul>
            <div class="actions">
                <button class="control-btn" id="pauseBtn" onclick="togglePauseGame()">Pause</button>
                <button class="control-btn secondary" onclick="restartGame()">Restart</button>
            </div>
            <div class="control-hint">
                <strong>Controls</strong><br>
                Mouse or touch: move paddle<br>
                Arrow keys / A D: move paddle<br>
                Space: launch / pause / resume<br>
                P or Esc: pause / resume<br>
                R: restart
            </div>
        </aside>
    </div>
    <script src="game.js"></script>
</body>
</html>
