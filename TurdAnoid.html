<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Turdanoid</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
</head>
<body>
<a href="hub.html" style="position:fixed;top:10px;right:10px;color:#0066cc;font-size:14px;text-decoration:none;z-index:100;">← Game Hub</a>
<script>
let paddle, ball, bricks;
let paddleWidth = 100;
let originalPaddleWidth = 100;
let paddleHeight = 15;
let ballRadius = 20;
let ballSpeed = 5;
let score = 0;
let highScore = parseInt(localStorage.getItem('turdanoidHighScore') || '0', 10);
let lives = 3;
let gameOver = false;
let gameWon = false;
let powerUps = [];
let toiletPaperShots = [];
let activePowerUps = { bigPaddle: 0, slowBall: 0, toiletPaper: 0 };
const POWERUP_TYPES = [
  { type: 'bigPaddle', emoji: '📏', name: 'Big Paddle' },
  { type: 'extraLife', emoji: '❤️', name: 'Extra Life' },
  { type: 'slowBall', emoji: '🐌', name: 'Slow Ball' },
  { type: 'toiletPaper', emoji: '🧻', name: 'Toilet Paper' }
];

function setup() {
  createCanvas(800, 600);
  resetGame();
}

function windowResized() {
  resizeCanvas(min(800, windowWidth), min(600, windowHeight - 20));
}

function resetGame() {
  paddle = createVector(width / 2 - paddleWidth / 2, height - 40);
  ball = createVector(width / 2, height - 60);
  let vx = random(-ballSpeed, ballSpeed);
  if (Math.abs(vx) < 0.5) {
    vx = vx >= 0 ? random(0.5, ballSpeed) : random(-ballSpeed, -0.5);
  }
  ball.velocity = createVector(vx, -ballSpeed);
  bricks = [];
  for (let i = 0; i < 8; i++) {
    for (let j = 0; j < 4; j++) {
      bricks.push({ x: i * 100 + 10, y: j * 40 + 50, w: 80, h: 20, broken: false });
    }
  }
  powerUps = [];
  toiletPaperShots = [];
  activePowerUps = { bigPaddle: 0, slowBall: 0, toiletPaper: 0 };
  paddleWidth = originalPaddleWidth;
  gameOver = false;
  gameWon = false;
  score = 0;
  lives = 3;
}

function createPowerUp(x, y) {
  if (powerUps.length >= 8) return;
  const p = POWERUP_TYPES[floor(random(POWERUP_TYPES.length))];
  powerUps.push({ x: x - 15, y: y, w: 30, h: 30, vy: 2, ...p });
}

function activatePowerUp(type) {
  if (type === 'bigPaddle') {
    activePowerUps.bigPaddle = 600;
    paddleWidth = originalPaddleWidth * 1.5;
  } else if (type === 'extraLife') {
    lives++;
  } else if (type === 'slowBall') {
    activePowerUps.slowBall = 450;
  } else if (type === 'toiletPaper') {
    activePowerUps.toiletPaper = 400;
  }
}

function draw() {
  background(220);
  
  if (gameOver || gameWon) {
    textSize(40);
    textAlign(CENTER);
    fill(0);
    if (gameWon) {
      text("Turd Triumph! You cleaned up! 🏆", width / 2, height / 2 - 40);
      text("Final Score: " + score, width / 2, height / 2 + 20);
    } else {
      text("Whoops! Turd got flushed! 😵", width / 2, height / 2 - 40);
      text("Final Score: " + score, width / 2, height / 2 + 20);
    }
    textSize(20);
    text((touches.length > 0 || 'ontouchstart' in window) ? "Tap to play again" : "Click to play again", width / 2, height / 2 + 60);
    return;
  }
  
  // Draw paddle
  fill(0, 128, 255);
  rect(paddle.x, paddle.y, paddleWidth, paddleHeight);
  // Move paddle (touch or mouse; fallback for touchX 0 on first load)
  const inputX = (touches.length > 0 && typeof touchX === 'number') ? touchX : mouseX;
  paddle.x = constrain(inputX - paddleWidth / 2, 0, width - paddleWidth);
  
  // Draw turd ball
  textSize(30);
  fill(0);
  textAlign(CENTER);
  text("💩", ball.x, ball.y);
  
  // Update power-up timers
  if (activePowerUps.bigPaddle > 0) {
    activePowerUps.bigPaddle--;
    if (activePowerUps.bigPaddle <= 0) paddleWidth = originalPaddleWidth;
  }
  if (activePowerUps.slowBall > 0) activePowerUps.slowBall--;
  if (activePowerUps.toiletPaper > 0) {
    activePowerUps.toiletPaper--;
    if (frameCount % 25 === 0 && activePowerUps.toiletPaper > 0 && toiletPaperShots.length < 10) {
      toiletPaperShots.push({ x: paddle.x + paddleWidth / 2 - 10, y: paddle.y, w: 20, h: 20, vy: -6 });
    }
  }
  
  // Update and draw toilet paper shots
  for (let i = toiletPaperShots.length - 1; i >= 0; i--) {
    const tp = toiletPaperShots[i];
    tp.y += tp.vy;
    if (tp.y < -tp.h) { toiletPaperShots.splice(i, 1); continue; }
    for (let j = bricks.length - 1; j >= 0; j--) {
      const b = bricks[j];
      if (tp.x + tp.w > b.x && tp.x < b.x + b.w && tp.y + tp.h > b.y && tp.y < b.y + b.h) {
        bricks.splice(j, 1);
        score += 10;
        if (score > highScore) { highScore = score; try { localStorage.setItem('turdanoidHighScore', String(highScore)); } catch (e) {} }
        toiletPaperShots.splice(i, 1);
        break;
      }
    }
  }
  
  // Update power-ups (fall, collide with paddle)
  for (let i = powerUps.length - 1; i >= 0; i--) {
    const pu = powerUps[i];
    pu.y += pu.vy;
    if (pu.y > height) { powerUps.splice(i, 1); continue; }
    if (pu.y + pu.h >= paddle.y && pu.y <= paddle.y + paddleHeight &&
        pu.x + pu.w >= paddle.x && pu.x <= paddle.x + paddleWidth) {
      activatePowerUp(pu.type);
      powerUps.splice(i, 1);
    }
  }
  
  // Move ball (apply slow ball)
  const speedMult = activePowerUps.slowBall > 0 ? 0.6 : 1;
  ball.x += ball.velocity.x * speedMult;
  ball.y += ball.velocity.y * speedMult;
  
  // Ball collisions with walls - improved
  if (ball.x <= ballRadius) {
    ball.x = ballRadius;
    ball.velocity.x = -ball.velocity.x;
  } else if (ball.x >= width - ballRadius) {
    ball.x = width - ballRadius;
    ball.velocity.x = -ball.velocity.x;
  }
  if (ball.y <= ballRadius) {
    ball.y = ballRadius;
    ball.velocity.y = -ball.velocity.y;
  }
  
  // Ball out of bounds
  if (ball.y >= height) {
    lives--;
    if (lives <= 0) {
      gameOver = true;
    } else {
      // Reset ball
      ball.x = width / 2;
      ball.y = height - 60;
      // Ensure ball has horizontal movement to prevent vertical-only bouncing
      let vx = random(-ballSpeed, ballSpeed);
      if (Math.abs(vx) < 0.5) {
        vx = vx >= 0 ? random(0.5, ballSpeed) : random(-ballSpeed, -0.5);
      }
      ball.velocity = createVector(vx, -ballSpeed);
    }
  }
  
  // Paddle collision - improved detection
  const ballBottom = ball.y + ballRadius;
  const ballTop = ball.y - ballRadius;
  const paddleTop = paddle.y;
  const paddleBottom = paddle.y + paddleHeight;
  const paddleLeft = paddle.x;
  const paddleRight = paddle.x + paddleWidth;
  
  if (ballBottom >= paddleTop && ballTop <= paddleBottom &&
      ball.x + ballRadius >= paddleLeft && ball.x - ballRadius <= paddleRight &&
      ball.velocity.y > 0) {
    // Calculate hit position for angle (prevent division by zero)
    const safePaddleWidth = Math.max(1, paddleWidth);
    const hitPos = Math.max(0, Math.min(1, (ball.x - paddleLeft) / safePaddleWidth));
    const angle = (hitPos - 0.5) * 0.6; // Max angle
    const currentSpeed = Math.max(ballSpeed, Math.sqrt(ball.velocity.x * ball.velocity.x + ball.velocity.y * ball.velocity.y));
    // Ensure speed is finite
    const safeSpeed = isFinite(currentSpeed) ? currentSpeed : ballSpeed;
    ball.velocity.x = Math.sin(angle) * safeSpeed;
    ball.velocity.y = -Math.abs(Math.cos(angle) * safeSpeed);
    // Ensure values are finite
    if (!isFinite(ball.velocity.x)) ball.velocity.x = safeSpeed * 0.5;
    if (!isFinite(ball.velocity.y)) ball.velocity.y = -safeSpeed;
    // Ensure minimum horizontal movement
    if (Math.abs(ball.velocity.x) < 0.5) {
      ball.velocity.x = ball.velocity.x >= 0 ? 0.5 : -0.5;
    }
    ball.y = paddleTop - ballRadius;
  }
  
  // Brick collisions - improved
  for (let i = bricks.length - 1; i >= 0; i--) {
    const brick = bricks[i];
    if (brick.broken) continue;
    
    // Better collision detection
    const ballLeft = ball.x - ballRadius;
    const ballRight = ball.x + ballRadius;
    const ballTop = ball.y - ballRadius;
    const ballBottom = ball.y + ballRadius;
    
    if (ballRight >= brick.x && ballLeft <= brick.x + brick.w &&
        ballBottom >= brick.y && ballTop <= brick.y + brick.h) {
      brick.broken = true;
      score = Math.min(Number.MAX_SAFE_INTEGER, score + 10);
      if (score > highScore) {
        highScore = score;
        try { localStorage.setItem('turdanoidHighScore', String(highScore)); } catch (e) {}
      }
      if (random() < 0.25) createPowerUp(brick.x + brick.w / 2, brick.y + brick.h / 2);
      
      // Determine collision side
      const ballCenterX = ball.x;
      const ballCenterY = ball.y;
      // Prevent division by zero
      const safeBrickW = Math.max(1, brick.w);
      const safeBrickH = Math.max(1, brick.h);
      const brickCenterX = brick.x + safeBrickW / 2;
      const brickCenterY = brick.y + safeBrickH / 2;
      
      const dx = ballCenterX - brickCenterX;
      const dy = ballCenterY - brickCenterY;
      const absDx = Math.abs(dx);
      const absDy = Math.abs(dy);
      
      // Bounce based on which side was hit
      if (absDx > absDy) {
        ball.velocity.x = -ball.velocity.x;
      } else {
        ball.velocity.y = -ball.velocity.y;
      }
      
      // Remove brick from array
      bricks.splice(i, 1);
    }
  }
  
  // Draw bricks
  fill(255, 165, 0);
  for (let brick of bricks) {
    if (!brick.broken) rect(brick.x, brick.y, brick.w, brick.h);
  }
  
  // Draw power-ups
  textSize(24);
  textAlign(CENTER, CENTER);
  for (let pu of powerUps) {
    text(pu.emoji, pu.x + pu.w / 2, pu.y + pu.h / 2);
  }
  
  // Draw toilet paper shots
  textSize(18);
  for (let tp of toiletPaperShots) {
    text('🧻', tp.x + tp.w / 2, tp.y + tp.h / 2);
  }
  
  // Draw UI
  textSize(20);
  textAlign(LEFT);
  fill(0);
  text("Poop Points: " + score, 10, 30);
  text("High Score: " + highScore, 10, 50);
  text("Lives: " + lives, 10, 70);
  
  // Win condition
  if (bricks.length === 0) {
    gameWon = true;
    if (score > highScore) {
      highScore = score;
      try { localStorage.setItem('turdanoidHighScore', String(highScore)); } catch (e) {}
    }
  }
}

function mousePressed() {
  if (gameOver || gameWon) {
    resetGame();
    loop();
  }
}

function touchStarted() {
  if (gameOver || gameWon) {
    resetGame();
    loop();
    return false;
  }
  return true;
}
</script>
</body>
</html>
